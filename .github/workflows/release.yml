name: Release installers

# Builds native installers on each OS and publishes them to the GitHub Release.
# jpackage can only build for the host OS, so each installer is built on its own
# runner. The macOS Intel runner is sometimes scarce, so it is kept off the
# release's critical path: the three reliable installers + checksums publish
# promptly, and the Intel .dmg attaches itself afterward only if it builds.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.type }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux-x64,   type: deb }
          - { os: windows-latest, label: windows-x64, type: msi }
          - { os: macos-latest,   label: macos-arm64, type: dmg }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils
      - name: Install WiX (Windows .msi backend)
        if: runner.os == 'Windows'
        run: choco install wixtoolset --no-progress -y
      - name: Build installer (Linux)
        if: runner.os == 'Linux'
        run: bash build-deb.sh
      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        run: bash build-mac.sh
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: packaging/dist/*.${{ matrix.type }}
          if-no-files-found: error

  # Best-effort Intel macOS build. Not a dependency of `release`, so a queued or
  # unavailable Intel runner can never stall the release.
  macos-intel:
    name: Build dmg (macos-13, Intel)
    runs-on: macos-13
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Intel .dmg
        run: |
          bash build-mac.sh
          for f in packaging/dist/*.dmg; do mv "$f" "${f%.dmg}-Intel.dmg"; done
      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos-intel
          path: packaging/dist/*.dmg
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: dist
          merge-multiple: true
      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          echo "ver=${VER}" >> $GITHUB_OUTPUT
      - name: Generate SHA-256 checksums
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS.txt
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ScribeDay ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            A polished JavaFX desktop journaling app — calendar + agenda views, autosave
            with Markdown preview, full-text search, theming, backup/restore, and Markdown export.

            ## Installers
            - **Linux (Debian/Ubuntu):** `scribeday_${{ steps.version.outputs.ver }}_amd64.deb` — `sudo apt install ./scribeday_${{ steps.version.outputs.ver }}_amd64.deb`
            - **Windows:** `ScribeDay-${{ steps.version.outputs.ver }}.msi` (unsigned — SmartScreen may warn)
            - **macOS (Apple Silicon):** `ScribeDay-${{ steps.version.outputs.ver }}.dmg` (unsigned — right-click → Open on first launch)
            - **macOS (Intel):** `ScribeDay-${{ steps.version.outputs.ver }}-Intel.dmg` — attached when the Intel build is available

            Each installer bundles its own Java + JavaFX runtime; no separate Java install is needed.

            ## Verify your download
            `SHA256SUMS.txt` lists the SHA-256 of every installer. Verify with:
            ```
            sha256sum -c SHA256SUMS.txt        # Linux
            shasum -a 256 -c SHA256SUMS.txt    # macOS
            ```

  # Adds the Intel .dmg (and regenerates the checksums to include it) once the
  # best-effort Intel build succeeds. Skipped if that runner never produced one.
  attach-intel:
    name: Attach Intel .dmg
    needs: [build, macos-intel]
    if: ${{ needs.macos-intel.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: dist
          merge-multiple: true
      - name: Generate SHA-256 checksums (including Intel)
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS.txt
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
